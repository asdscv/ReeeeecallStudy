name: Deploy Mobile (EAS Update / Build)

on:
  push:
    branches: [main]
    paths:
      - 'packages/mobile/**'
      - 'packages/shared/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deploy mode'
        required: true
        default: 'auto'
        type: choice
        options: [auto, ota, native]

concurrency:
  group: deploy-mobile-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Decide: OTA (eas update) vs full native build
  # Heuristic: native build required if android/ios/app.json/app.config.js
  # changed. Otherwise OTA is safe.
  # ─────────────────────────────────────────────────────────────────────
  decide:
    name: Decide deploy mode
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.choose.outputs.mode }}
      has_expo_token: ${{ steps.token.outputs.has_token }}
    steps:
      - id: token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -n "$EXPO_TOKEN" ]; then
            echo "has_token=true" >> $GITHUB_OUTPUT
          else
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "::warning::EXPO_TOKEN secret not configured — mobile deploy will be skipped."
          fi
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: choose
        run: |
          MANUAL="${{ github.event.inputs.mode }}"
          if [ "$MANUAL" = "ota" ] || [ "$MANUAL" = "native" ]; then
            echo "mode=$MANUAL" >> $GITHUB_OUTPUT
            exit 0
          fi
          if git diff --name-only HEAD^ HEAD | grep -E '^packages/mobile/(android|ios|app\.json|app\.config\.js)' >/dev/null; then
            echo "mode=native" >> $GITHUB_OUTPUT
          else
            echo "mode=ota" >> $GITHUB_OUTPUT
          fi

  ota:
    name: EAS Update (OTA)
    needs: decide
    if: needs.decide.outputs.mode == 'ota' && needs.decide.outputs.has_expo_token == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Diagnose shared package layout
        working-directory: packages/mobile
        run: |
          echo "::group::node_modules/@reeeeecall layout"
          ls -la node_modules/@reeeeecall/ 2>&1 || echo "no @reeeeecall in mobile node_modules"
          ls -la ../../node_modules/@reeeeecall/ 2>&1 || echo "no @reeeeecall in root node_modules"
          echo "::endgroup::"
          echo "::group::shared package contents (whichever resolves)"
          for p in node_modules/@reeeeecall/shared ../../node_modules/@reeeeecall/shared; do
            if [ -e "$p" ]; then
              echo "[$p] exists. Type: $(file "$p" | head -1)"
              if [ -L "$p" ]; then echo "  symlink → $(readlink $p)"; fi
              ls -la "$p/design-tokens" 2>&1 | head -10
            fi
          done
          echo "::endgroup::"
          echo "::group::metro version + resolver flag"
          node -e "const c = require('./metro.config.js'); console.log('unstable_enablePackageExports =', c.resolver.unstable_enablePackageExports); console.log('sourceExts =', c.resolver.sourceExts);"
          echo "::endgroup::"
      - name: Publish OTA update
        working-directory: packages/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          MSG="${{ github.event.head_commit.message }}"
          # Truncate to first line to avoid CLI parser issues with multi-line.
          MSG=$(echo "$MSG" | head -1)
          # Fallback for workflow_dispatch (no head_commit) or empty message.
          if [ -z "$MSG" ]; then
            MSG=$(git log -1 --pretty=%s)
          fi
          if [ -z "$MSG" ]; then
            MSG="OTA update ${GITHUB_SHA::7}"
          fi
          eas update \
            --branch production \
            --environment production \
            --message "$MSG" \
            --non-interactive

  native-build:
    name: EAS Build + Submit
    needs: decide
    if: needs.decide.outputs.mode == 'native' && needs.decide.outputs.has_expo_token == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: EAS build (production, no-wait)
        working-directory: packages/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform all --profile production --non-interactive --no-wait
      # Submission is gated on a separate manual approval workflow:
      #   `.github/workflows/submit-mobile.yml`
