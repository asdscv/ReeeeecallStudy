name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9.15.0
  NODE_VERSION: 20

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Job 1: Lint + Typecheck (fast feedback)
  # ─────────────────────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      # Strict gate — typecheck must pass for the whole web package.
      # Use `tsc -b` so project references (tsconfig.app.json, tsconfig.node.json)
      # are actually checked; plain `tsc --noEmit` on the root config is a no-op
      # because the root has `files: []` and only `references`.
      - name: Web typecheck
        run: pnpm --filter @reeeeecall/web exec tsc -b --noEmit

      # Lint is currently informational — develop has pre-existing eslint
      # debt (no-explicit-any, no-unused-vars, react-hooks/rules-of-hooks).
      # Tracked for cleanup in a dedicated PR; this workflow doesn't gate on it.
      - name: Web lint (informational)
        run: pnpm --filter @reeeeecall/web lint
        continue-on-error: true
      - name: Mobile typecheck (regression guard for marketplace scope)
        run: |
          set +e
          pnpm --filter @reeeeecall/mobile exec tsc --noEmit 2>&1 | tee /tmp/mobile-tsc.log
          # Pre-existing baseline errors are tolerated; new marketplace/acquire scope errors are not.
          if grep -E "(MarketplaceDetail|marketplace-store|acquireDeck|deck-store)" /tmp/mobile-tsc.log; then
            echo "::error::TypeScript error introduced in marketplace/acquire scope"
            exit 1
          fi
          exit 0

  # ─────────────────────────────────────────────────────────────────────
  # Job 2: Unit tests (vitest)
  # ─────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      # Strict gate — marketplace acquire scope tests must pass.
      # Pre-existing failures in unrelated suites (guide.json i18n, etc.)
      # are tracked as tech debt and fixed in dedicated PRs, not here.
      - name: Vitest — marketplace acquire scope (REQUIRED)
        working-directory: packages/web
        run: |
          npx vitest run \
            src/stores/__tests__/marketplace-acquire-atomic.test.ts \
            src/stores/__tests__/deck-store-subscriptions.test.ts

      # Full suite — informational only; tracks debt without blocking.
      - name: Vitest — full suite (informational)
        working-directory: packages/web
        run: npx vitest run --reporter=verbose
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: packages/web/coverage
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────
  # Job 3: Real Supabase integration tests (atomic acquire flow, etc.)
  # ─────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration (Supabase)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - uses: supabase/setup-cli@v1
        with:
          # Pinned: CLI 2.107.0 stopped granting default DML (SELECT/INSERT/UPDATE/
          # DELETE) to anon/authenticated on `db reset`, breaking integration grants
          # (e.g. acquire_listing → "permission denied for table deck_shares").
          # Prod + the migrations themselves are unaffected (verified); this keeps
          # the local test DB's role grants correct.
          version: 2.95.4
      - run: pnpm install --frozen-lockfile

      - name: Start Supabase (local stack via Docker)
        run: |
          supabase start
          # Apply all migrations to fresh DB (init schema → all RPCs)
          supabase db reset --no-seed

      - name: Capture Supabase keys
        id: keys
        run: |
          ANON=$(supabase status -o json | jq -r .ANON_KEY)
          SVC=$(supabase status -o json | jq -r .SERVICE_ROLE_KEY)
          echo "anon=$ANON" >> $GITHUB_OUTPUT
          echo "svc=$SVC" >> $GITHUB_OUTPUT

      - name: Run integration suite
        env:
          SUPABASE_LOCAL_URL: http://127.0.0.1:54321
          SUPABASE_ANON_KEY: ${{ steps.keys.outputs.anon }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.keys.outputs.svc }}
        # Run from repo root — vitest resolves include paths from cwd. Use the
        # web package's vitest binary (the only place it's installed).
        run: |
          ./node_modules/.bin/vitest run \
            --config tests/integration/vitest.config.ts \
            tests/integration \
            || packages/web/node_modules/.bin/vitest run \
              --config tests/integration/vitest.config.ts \
              tests/integration

      - name: Stop Supabase
        if: always()
        run: supabase stop || true

  # ─────────────────────────────────────────────────────────────────────
  # Job 4: Architecture guard — domain layer must not import supabase
  # ─────────────────────────────────────────────────────────────────────
  arch-guard:
    name: Architecture Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run arch checks
        # tsx is a transitive devDep of @reeeeecall/web; resolve via the web package
        run: pnpm --filter @reeeeecall/web exec tsx ../../tools/check-arch.ts

  # ─────────────────────────────────────────────────────────────────────
  # Job 5: Migration safety — every migration must apply against fresh DB
  # ─────────────────────────────────────────────────────────────────────
  migration-safety:
    name: Migration Safety
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          # Pinned: CLI 2.107.0 stopped granting default DML (SELECT/INSERT/UPDATE/
          # DELETE) to anon/authenticated on `db reset`, breaking integration grants
          # (e.g. acquire_listing → "permission denied for table deck_shares").
          # Prod + the migrations themselves are unaffected (verified); this keeps
          # the local test DB's role grants correct.
          version: 2.95.4
      - name: Reset DB with all migrations
        run: |
          supabase start
          supabase db reset --no-seed
      - name: Idempotency check — running reset twice should pass
        run: supabase db reset --no-seed
      - name: Stop
        if: always()
        run: supabase stop || true

  # ─────────────────────────────────────────────────────────────────────
  # Job 6: AI credit / metering money-logic regression suite
  #   The server-side AI generation wallet moves real money (free-tier
  #   accounting, atomic credit debit, idempotent grants/refunds), so it gets
  #   assertion coverage on every PR. Uses the lightweight plain-postgres
  #   pattern (bootstrap-auth shim → full migration chain → assertion SQL),
  #   the same one official-decks' migration-smoke proves out on the runner —
  #   no Docker supabase stack needed. ON_ERROR_STOP + ASSERT means any failed
  #   invariant aborts the job non-zero.
  # ─────────────────────────────────────────────────────────────────────
  ai-credit-tests:
    name: AI Credit Metering (postgres-15)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap auth/storage/extensions schema
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f .github/scripts/bootstrap-auth.sql

      - name: Apply migrations in order
        env:
          PGPASSWORD: postgres
        run: |
          for f in supabase/migrations/*.sql; do
            echo "==> $f"
            psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run AI credit / metering assertions
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/ai_credit_metering_test.sql

      - name: Run AI cost / margin / pricing assertions
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/ai_cost_margin_test.sql

      - name: Run AI metered smoke + net-zero + dry-run + reconcile assertions
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/ai_metered_smoke_test.sql

      - name: Run owned-card limit assertions
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/card_limit_test.sql

      - name: Run owned-card limit smoke + net-zero + dry-run assertions
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/card_limit_smoke_test.sql

      - name: Run owned-card limit INSERT-GUARD trigger + usage-detail assertions
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/card_limit_guard_test.sql

      - name: Run over-cap SUBSCRIBED card study-lock assertions
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/card_limit_sub_lock_test.sql

      - name: Run card-limit RLS hardening assertions (reactivation guard + deck-ownership)
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/card_limit_rls_test.sql

      - name: Run payment edge-case hardening assertions (mig 144 — terminal guard / retire / clawback / transfer)
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/payment_edgecase_test.sql
